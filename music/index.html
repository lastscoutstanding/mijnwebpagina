<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muziek Zoeker - Dubbele Tab</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #121212; 
            color: white;
        }
        .search-box {
            text-align: center;
            background: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { margin-bottom: 20px; font-weight: 300; }
        input { 
            padding: 12px 20px; 
            width: 300px; 
            border-radius: 25px; 
            border: 1px solid #333; 
            background: #252525; 
            color: white;
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: #007bff; }
        button { 
            padding: 12px 25px; 
            margin-left: 10px; 
            cursor: pointer; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 25px; 
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover { background: #0056b3; }
        p { color: #888; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="search-box">
    <h1>Muziek Zoeker</h1>
    <input type="text" id="searchInput" placeholder="Voer artiest of album in..." autofocus>
    <button onclick="performSearch()">Zoek</button>
    <p>Opent resultaten in Discogs en AllMusic in nieuwe tabbladen.</p>
</div>

<script>
    function performSearch() {
        const query = document.getElementById('searchInput').value;
        if (!query) return;

        const encodedQuery = encodeURIComponent(query);

        // De twee URL's die geopend gaan worden
        const discogsUrl = `https://discogs.com{encodedQuery}`;
        const allmusicUrl = `https://allmusic.com{encodedQuery}`;

        // Open de tabbladen
        window.open(discogsUrl, '_blank');
        window.open(allmusicUrl, '_blank');
    }

    // Luister naar de 'Enter' toets
    document.getElementById('searchInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            performSearch();
        }
    });
</script>

</body>
</html>
