<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Muziek Zoeker (Proxy Versie)</title>
    <style>
        body, html { margin: 0; height: 100%; font-family: sans-serif; overflow: hidden; }
        .header { height: 60px; background: #222; color: white; display: flex; align-items: center; padding: 0 20px; gap: 10px; }
        input { padding: 8px; width: 250px; border-radius: 4px; border: none; }
        button { padding: 8px 15px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px; }
        .container { display: flex; height: calc(100% - 60px); }
        iframe { flex: 1; border: none; height: 100%; width: 50%; }
        .label { position: absolute; background: rgba(0,0,0,0.7); color: white; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="header">
    <input type="text" id="searchInput" placeholder="Bijv. King Crimson...">
    <button onclick="performSearch()">Zoek overal</button>
    <small>(Discogs via proxy kan traag zijn)</small>
</div>

<div class="container">
    <div style="flex:1; position:relative;">
        <span class="label">Wikipedia</span>
        <iframe id="wikiFrame" src="about:blank"></iframe>
    </div>
    <div style="flex:1; position:relative;">
        <span class="label">Discogs (via X-Frame-Bypass)</span>
        <!-- We gebruiken een speciale custom element library om X-Frame-Options te omzeilen -->
        <script type="module" src="https://unpkg.com/x-frame-bypass"></script>
        <iframe is="x-frame-bypass" id="discogsFrame" src="about:blank"></iframe>
    </div>
</div>

<script>
    function performSearch() {
        const query = document.getElementById('searchInput').value;
        if (!query) return;
        const encoded = encodeURIComponent(query);

        // Wikipedia staat frames vaak toe
        document.getElementById('wikiFrame').src = `https://wikipedia.org{encoded}`;
        
        // Discogs met de 'x-frame-bypass' truc
        document.getElementById('discogsFrame').src = `https://discogs.com{encoded}`;
    }

    document.getElementById('searchInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') performSearch(); });
</script>

</body>
</html>
